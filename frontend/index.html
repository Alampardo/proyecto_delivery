<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA: manifest e íconos -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Viewport y color de tema -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />

    <!-- iOS: comportamiento de app instalada -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DeliveryApp" />

    <!-- Android / general -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="DeliveryApp" />
    <meta name="description" content="Pedidos a domicilio, rápido y fácil" />

    <title>DeliveryApp</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
