<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: fondo llena todo el cuadrado (sin bordes redondeados) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Zona segura: contenido centrado dentro del 80% del ícono -->
  <!-- Caja de delivery -->
  <rect x="168" y="206" width="176" height="140" rx="14" fill="white" opacity="0.95"/>
  <rect x="148" y="174" width="216" height="42" rx="12" fill="white"/>
  <line x1="256" y1="174" x2="256" y2="216" stroke="#f97316" stroke-width="7"/>
  <!-- Ruedas -->
  <circle cx="208" cy="388" r="30" fill="white" opacity="0.9"/>
  <circle cx="304" cy="388" r="30" fill="white" opacity="0.9"/>
  <rect x="178" y="356" width="156" height="18" rx="9" fill="white" opacity="0.7"/>
  <!-- Líneas de velocidad -->
  <rect x="74"  y="268" width="52" height="12" rx="6" fill="white" opacity="0.5"/>
  <rect x="82"  y="292" width="38" height="12" rx="6" fill="white" opacity="0.35"/>
</svg>
