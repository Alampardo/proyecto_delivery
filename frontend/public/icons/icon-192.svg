  <!-- Líneas de velocidad -->
  <rect x="22" y="100" width="24" height="5" rx="2.5" fill="white" opacity="0.55"/>
  <rect x="26" y="111" width="18" height="5" rx="2.5" fill="white" opacity="0.38"/>
  <!-- Ruedas -->
  <circle cx="74"  cy="150" r="13" fill="white" opacity="0.9"/>
  <circle cx="118" cy="150" r="13" fill="white" opacity="0.9"/>
  <!-- Eje / base de la moto -->
