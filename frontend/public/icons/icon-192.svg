      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Caja de delivery -->
  <rect x="56" y="74" width="80" height="64" rx="6" fill="white" opacity="0.95"/>
  <rect x="48" y="62" width="96" height="18" rx="5" fill="white"/>
